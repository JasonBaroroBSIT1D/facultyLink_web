<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FacultyLink — Forgot Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <div class="login-page">
    {% from 'macros.html' import flash_messages %}
    {{ flash_messages() }}
    <div class="login-card" style="max-width: 480px; min-height: auto;">
      <section class="login-form-panel" style="flex: 1;">
        <h2>Forgot Password</h2>
        <p class="subtitle">Enter your institution email to receive reset instructions.</p>
        <form method="POST" class="form-panel">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="faculty.name@university.edu">
          </div>
          <button type="submit" class="btn-login">Send Reset Link</button>
        </form>
        <p class="login-footer-text" style="margin-top: 1rem;">
          <a href="{{ url_for('login') }}">← Back to Login</a>
        </p>
      </section>
    </div>
  </div>
</body>
</html>
